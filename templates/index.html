<!DOCTYPE html>
<html>
  <head>
    <title>Task Manager</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Georgia", serif;
        background: #25344f;
        min-height: 100vh;
      }

      /* hero */
      .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 20px;
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center, #617891 0%, #25344f 70%);
        opacity: 0.15;
      }
      .hero h1 {
        font-size: 52px;
        font-weight: 400;
        color: #d5b893;
        letter-spacing: 6px;
        text-transform: uppercase;
        opacity: 0;
        transform: translateY(30px);
        animation: fadeUp 1s ease forwards 0.3s;
      }
      .hero p {
        font-size: 14px;
        color: #617891;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-top: 16px;
        opacity: 0;
        animation: fadeUp 1s ease forwards 0.7s;
      }
      .scroll-hint {
        position: absolute;
        bottom: 40px;
        color: #617891;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0;
        animation: fadeUp 1s ease forwards 1.2s;
      }
      .scroll-hint span {
        display: block;
        text-align: center;
        margin-top: 8px;
        animation: bounce 1.5s infinite;
      }

      /* main content */
      .container {
        max-width: 620px;
        margin: 0 auto;
        padding: 60px 20px;
      }
      .section-title {
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #617891;
        margin-bottom: 24px;
      }
      .card {
        background: #1e2d42;
        border: 1px solid #617891;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        opacity: 0;
        transform: translateY(40px);
        transition: opacity 0.6s ease, transform 0.6s ease;
      }
      .card.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      input,
      select {
        flex: 1;
        min-width: 120px;
        padding: 10px 14px;
        background: #25344f;
        border: 1px solid #617891;
        border-radius: 8px;
        color: #d5b893;
        font-size: 14px;
        font-family: "Georgia", serif;
      }
      input::placeholder {
        color: #617891;
      }
      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0.5);
      }
      select option {
        background: #25344f;
        color: #d5b893;
      }
      button {
        padding: 10px 18px;
        background: #d5b893;
        border: none;
        border-radius: 8px;
        color: #25344f;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: "Georgia", serif;
        letter-spacing: 0.5px;
        transition: background 0.2s;
      }
      button:hover {
        background: #c4a57e;
      }

      .heap-raw {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .heap-item {
        text-align: center;
      }
      .node {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        transition: transform 0.3s ease;
      }
      .node:hover {
        transform: scale(1.15);
      }
      .node.high {
        background: #632024;
        color: #f5c4c4;
        border: 1px solid #8a3035;
      }
      .node.medium {
        background: #6f4d38;
        color: #d5b893;
        border: 1px solid #8a6245;
      }
      .node.low {
        background: #25344f;
        color: #617891;
        border: 1px solid #617891;
      }
      .index {
        font-size: 10px;
        color: #617891;
        margin-top: 3px;
      }

      .task {
        background: #25344f;
        border: 1px solid #617891;
        border-radius: 10px;
        padding: 12px 16px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        opacity: 0;
        transform: translateX(-20px);
        animation: slideIn 0.4s ease forwards;
      }
      .task.top {
        border-color: #d5b893;
      }
      .task-name {
        flex: 1;
        font-size: 14px;
        color: #d5b893;
      }
      .badge {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 20px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .badge.high {
        background: #632024;
        color: #f5c4c4;
      }
      .badge.medium {
        background: #6f4d38;
        color: #d5b893;
      }
      .badge.low {
        background: #1e2d42;
        color: #617891;
        border: 1px solid #617891;
      }
      .task-date {
        font-size: 12px;
        color: #617891;
      }
      .popped {
        background: #1e2d42;
        border: 1px solid #617891;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        color: #617891;
        margin-bottom: 12px;
        animation: fadeUp 0.4s ease forwards;
      }
      .popped strong {
        color: #d5b893;
      }
      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .pop-btn {
        padding: 8px 14px;
        background: transparent;
        border: 1px solid #617891;
        color: #617891;
        font-size: 13px;
        border-radius: 8px;
        transition: all 0.2s;
      }
      .pop-btn:hover {
        border-color: #d5b893;
        color: #d5b893;
        background: transparent;
      }
      .arrow {
        color: #d5b893;
        font-size: 16px;
      }

      @keyframes fadeUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideIn {
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(6px);
        }
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <h1>Task Manager</h1>
      <p>priority queue — heap powered</p>
      <div class="scroll-hint">
        scroll down
        <span>↓</span>
      </div>
    </div>

    <div class="container">
      <div class="card">
        <div class="section-title">Add a task</div>
        <div class="row">
          <input type="text" id="taskName" placeholder="Task name..." />
          <select id="priority">
            <option value="1">High</option>
            <option value="2" selected>Medium</option>
            <option value="3">Low</option>
          </select>
          <input type="date" id="deadline" />
          <button onclick="addTask()">+ Add</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Heap array (raw list)</div>
        <div class="heap-raw" id="heapRaw">
          <span style="font-size: 13px; color: #617891">empty</span>
        </div>
      </div>

      <div class="card">
        <div class="top-row">
          <div class="section-title" style="margin: 0">
            Tasks — priority order
          </div>
          <button class="pop-btn" onclick="popTask()">↑ Pop next</button>
        </div>
        <div id="poppedMsg"></div>
        <div id="taskList">
          <div style="font-size: 13px; color: #617891">no tasks yet</div>
        </div>
      </div>
    </div>

    <script>
      const priorityLabel = { 1: "high", 2: "medium", 3: "low" };
      const priorityShort = { 1: "H", 2: "M", 3: "L" };

      // scroll reveal
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((e, i) => {
            if (e.isIntersecting) {
              setTimeout(() => e.target.classList.add("visible"), i * 150);
            }
          });
        },
        { threshold: 0.1 }
      );
      document.querySelectorAll(".card").forEach((c) => observer.observe(c));

      async function addTask() {
        const name = document.getElementById("taskName").value.trim();
        const priority = parseInt(document.getElementById("priority").value);
        const deadline = document.getElementById("deadline").value;
        if (!name) return;
        const res = await fetch("/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, priority, deadline }),
        });
        const data = await res.json();
        document.getElementById("taskName").value = "";
        document.getElementById("poppedMsg").innerHTML = "";
        render(data.heap);
      }

      async function popTask() {
        const res = await fetch("/pop", { method: "POST" });
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById(
          "poppedMsg"
        ).innerHTML = `<div class="popped">Popped: <strong>${
          data.task.name
        }</strong> (${priorityLabel[data.task.priority]}${
          data.task.deadline ? ", due " + data.task.deadline : ""
        })</div>`;
        render(data.heap);
      }

      function render(heap) {
        document.getElementById("heapRaw").innerHTML =
          heap
            .map(
              (t, i) =>
                `<div class="heap-item">
          <div class="node ${priorityLabel[t.priority]}">${
                  priorityShort[t.priority]
                }</div>
          <div class="index">[${i}]</div>
        </div>`
            )
            .join("") ||
          '<span style="font-size:13px;color:#617891">empty</span>';

        const sorted = [...heap].sort((a, b) => a.priority - b.priority);
        document.getElementById("taskList").innerHTML =
          sorted
            .map(
              (t, i) =>
                `<div class="task ${
                  i === 0 ? "top" : ""
                }" style="animation-delay:${i * 0.08}s">
          ${
            i === 0
              ? '<span class="arrow">→</span>'
              : '<span style="width:16px;display:inline-block"></span>'
          }
          <span class="task-name">${t.name}</span>
          <span class="badge ${priorityLabel[t.priority]}">${
                  priorityLabel[t.priority]
                }</span>
          ${t.deadline ? `<span class="task-date">${t.deadline}</span>` : ""}
        </div>`
            )
            .join("") ||
          '<div style="font-size:13px;color:#617891">no tasks yet</div>';
      }

      render([]);
    </script>
  </body>
</html>

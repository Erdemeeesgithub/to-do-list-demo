<!DOCTYPE html>
<html>
  <head>
    <title>Task Manager</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
        background: #f9f9f9;
      }
      h1 {
        font-size: 22px;
        font-weight: 500;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      input,
      select {
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        flex: 1;
      }
      button {
        padding: 8px 16px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: white;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background: #f0f0f0;
      }
      .task {
        background: white;
        border: 1px solid #eee;
        border-radius: 10px;
        padding: 12px 16px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .task.top {
        border: 1.5px solid #1d9e75;
      }
      .badge {
        font-size: 12px;
        padding: 3px 10px;
        border-radius: 6px;
        font-weight: 500;
      }
      .high {
        background: #fcebeb;
        color: #a32d2d;
      }
      .medium {
        background: #faeeda;
        color: #854f0b;
      }
      .low {
        background: #eaf3de;
        color: #3b6d11;
      }
      .name {
        flex: 1;
        font-size: 14px;
        font-weight: 500;
      }
      .date {
        font-size: 12px;
        color: #888;
      }
      .heap-raw {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .node {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 500;
        border: 1px solid #ddd;
      }
      .popped {
        background: #f0f0f0;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
        color: #555;
        margin-bottom: 12px;
      }
      label {
        font-size: 13px;
        color: #888;
        margin-bottom: 4px;
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>Task Manager</h1>

    <div class="row">
      <input type="text" id="taskName" placeholder="Task name..." />
      <select id="priority">
        <option value="1">High</option>
        <option value="2" selected>Medium</option>
        <option value="3">Low</option>
      </select>
      <input type="date" id="deadline" />
      <button onclick="addTask()">+ Add</button>
    </div>

    <label>Heap array (raw list)</label>
    <div class="heap-raw" id="heapRaw"></div>

    <div
      style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      "
    >
      <label style="margin: 0">Tasks (priority order)</label>
      <button onclick="popTask()">↑ Pop next</button>
    </div>
    <div id="poppedMsg"></div>
    <div id="taskList"></div>

    <script>
      const priorityLabel = { 1: "high", 2: "medium", 3: "low" };
      const priorityShort = { 1: "H", 2: "M", 3: "L" };
      const priorityColor = { 1: "high", 2: "medium", 3: "low" };

      async function addTask() {
        const name = document.getElementById("taskName").value.trim();
        const priority = parseInt(document.getElementById("priority").value);
        const deadline = document.getElementById("deadline").value;
        if (!name) return;
        const res = await fetch("/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, priority, deadline }),
        });
        const data = await res.json();
        document.getElementById("taskName").value = "";
        document.getElementById("poppedMsg").innerHTML = "";
        render(data.heap);
      }

      async function popTask() {
        const res = await fetch("/pop", { method: "POST" });
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById(
          "poppedMsg"
        ).innerHTML = `<div class="popped">Popped: <strong>${
          data.task.name
        }</strong> (${priorityLabel[data.task.priority]}${
          data.task.deadline ? ", due " + data.task.deadline : ""
        })</div>`;
        render(data.heap);
      }

      function render(heap) {
        document.getElementById("heapRaw").innerHTML =
          heap
            .map(
              (t, i) =>
                `<div style="text-align:center">
          <div class="node ${priorityColor[t.priority]}">${
                  priorityShort[t.priority]
                }</div>
          <div style="font-size:10px;color:#aaa">[${i}]</div>
        </div>`
            )
            .join("") || '<span style="font-size:13px;color:#aaa">empty</span>';

        const sorted = [...heap].sort((a, b) => a.priority - b.priority);
        document.getElementById("taskList").innerHTML =
          sorted
            .map(
              (t, i) =>
                `<div class="task ${i === 0 ? "top" : ""}">
          ${i === 0 ? "→" : '<span style="width:12px"></span>'}
          <span class="name">${t.name}</span>
          <span class="badge ${priorityColor[t.priority]}">${
                  priorityLabel[t.priority]
                }</span>
          ${t.deadline ? `<span class="date">${t.deadline}</span>` : ""}
        </div>`
            )
            .join("") ||
          '<div style="font-size:13px;color:#aaa">no tasks yet</div>';
      }

      render([]);
    </script>
  </body>
</html>
